# Frozen recipe for pooled wer_normalized ≈ 0.410 (n=1041 Hub test).
# Source: predictions/metrics.json, run_info.output_dir = gemma4-eval-run-chuncked
# Git era: after d1a6559 (eval + optional anti-loop), before 194ca2f (QC on prepare).

model: E2B
base_model_id: google/gemma-4-E2B-it
checkpoint: artifacts/checkpoints/best

prepare:
  script: scripts/prepare_gemma4.py
  args:
    - --chunk-long-audio
    - --chunk-test
  # DO NOT use: --aggressive-qc

train:
  script: scripts/train_gemma4.py
  args:
    - --model
    - E2B
    - --replay-ratio
    - "0.05"
    - --lr
    - "1e-4"
    - --epochs
    - "2"
    - --grad-accum
    - "16"
    - --eval-max-samples
    - "64"
    - --save-steps
    - "500"
  notes: "4-bit QLoRA default; use main@4c325cd+ for finfo/masked_scatter patches on server"

eval_recorded_0_41:
  script: scripts/evaluate_gemma4.py
  args:
    - --model
    - E2B
    - --checkpoint
    - artifacts/checkpoints/best
    - --test_datasets
    - smutuvi/ndizi-1:test
    - smutuvi/ndizi-1-2025:test
    - --output_dir
    - eval/gemma4-eval-run-chuncked
    - --chunk_length_s
    - "30"
    - --batch-size
    - "4"
    - --normalize
    - jiwer_default
  metrics:
    wer_normalized: 0.40982788132369724
    wer_raw: 0.45203105339379407
    n_utterances: 1041
  # run_info did not log anti-loop; optional improvement with --anti-loop-decode

eval_recommended_decode:
  adds:
    - --anti-loop-decode
  # or: --max-new-tokens 96 --repetition-penalty 1.15 --no-repeat-ngram-size 3

git:
  tag: baseline-wer-0.41-2026-05-28
  commit: d1a655920e0a736ecab75d614120e8482ef91c57
  train_fixes_use: main
  train_fixes_commit_min: 4c325cd
